name: tests

on:
  push:
  pull_request:

jobs:
  bst-regression:
    name: acl_natbib.bst author-list regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install BibTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-base texlive-binaries
          bibtex --version | head -1

      - name: Run author-list regression suite
        run: python3 tests/regression/run_tests.py
